# ======= Soul 重写规则 v0.2 =======
# 所有规则统一为 url reject / url script-response-body
# 不再使用 host-suffix（在Rewrite资源中无效）

# === Soul 广告模块 — 通杀 ===

# > Soul SSP 广告平台 — 脚本无条件返回空JSON（v2.0最可靠方案）
^https?://ssp\.soulapp\.cn\/ url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_ssp_ads.js

# > Soul 广告子域名全阻断（ad-r=加密上报, 其余=广告投放/配置/商业化）
