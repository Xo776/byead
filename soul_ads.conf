// ==UserScript==
// @ScriptName        Soul去开屏广告 v1.0
// @Author            custom
// @UpdateTime        2026-06-14
// @Function          去除Soul App开屏广告、插屏广告、广告积分弹窗
// @Description       基于Soul App流量抓包分析，拦截5个广告API端点
// ==/UserScript==

# ======= Soul 去广告 ======= #

# > Soul - 全局弹窗配置（核心：过滤 AD_Interstitial, AD_Points, UG_Startup_flex 等广告弹窗）
^https?:\/\/api-a\.soulapp\.cn\/soul\/global\/popup\/(allConfig|config) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_popup_ads.js

# > Soul - 启动广告策略（直接拒绝）
^https?:\/\/increase-openapi\.soulapp\.cn\/increase\/startup\/policy url reject-200

# > Soul - SSP广告竞价（直接拒绝，阻断广告素材加载）
^https?:\/\/ssp\.soulapp\.cn\/api\/bidResult url reject-200

# > Soul - 广告曝光上报（直接拒绝）
^https?:\/\/ad-r\.soulapp\.cn\/api\/v2\/report url reject-200

# > Soul - 数据上报
^https?:\/\/data-collector\.soulapp\.cn\/api\/data\/report$ url reject-200

# MITM 主机名（添加到QuantumultX的MITM列表）
hostname = *.soulapp.cn, api-a.soulapp.cn, increase-openapi.soulapp.cn, ssp.soulapp.cn, ad-r.soulapp.cn, data-collector.soulapp.cn
