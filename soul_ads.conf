# > Soul - 全局弹窗配置（JS脚本过滤广告bizCode）
^https?:\/\/api-a\.soulapp\.cn\/soul\/global\/popup\/(allConfig|config) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_popup_ads.js

# > Soul - 广场信息流广告过滤（JS脚本过滤feed中的广告帖子 isAd/ad/adExtension）
^https?:\/\/post\.soulapp\.cn\/.*\/(recommended|timeline|container_timeline|unread_hot_timeline|extend|highLight\/recommend) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_feed_ads.js

# > Soul - 启动广告策略（host规则已覆盖）
# > Soul - SSP广告平台（双保险：host阻断 + JS响应清空）
^https?:\/\/ssp\.soulapp\.cn\/api\/q\? url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_ssp_ads.js
# > Soul - 广告曝光上报（host规则已覆盖）
# > Soul - 数据上报（host规则已覆盖）

