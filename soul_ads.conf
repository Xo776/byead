# ======= Soul 重写规则 v0.2 =======
# 所有规则统一为 url reject / url script-response-body
# 不再使用 host-suffix（在Rewrite资源中无效）

# === Soul 广告模块 — 通杀 ===

# > Soul SSP 广告平台（api/q返回广告数据，JS清空ads/prs）
^https?://ssp\.soulapp\.cn\/api\/(q|ping|materialCacheConfig) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_ssp_ads.js

# > Soul SSP 其他路径阻断（脚本覆盖之外的）
^https?://ssp\.soulapp\.cn\/ url reject

# > Soul 广告子域名全阻断（ssp已单独处理，不在此列）
^https?://(ad|ad-r|soul-ad|ad-audit-provider|ad-brand-activity|ad-h5-cdn|ad-reward|ad-reward-test|soul-commercial|soul-report|marketing-openapi)\.soulapp\.cn\/ url reject

# > Soul 追踪/日志子域名
^https?:\/\/(data-collector|datacollector-sea|insight|aegis-log|aegis-cdn|fingerprint|increase-openapi|gateway2-tcp-spam|handshake\.gtnetwork|soul-permanent)\.soulapp\.cn\/ url reject

# > Soul - 全局弹窗配置（JS脚本过滤广告bizCode）
^https?:\/\/api-a\.soulapp\.cn\/soul\/global\/popup\/(allConfig|config) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_popup_ads.js

# > Soul - 广场信息流广告过滤+推广内容清除
^https?:\/\/post\.soulapp\.cn\/.*\/(recommended|timeline|container_timeline|unread_hot_timeline|extend|highLight\/recommend|recSquare\/subTabResource) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_feed_ads.js

# === 穿山甲 Pangle (字节跳动) ===

# > Pangle/GDT SDK 直连广告API阻断（返回错误码废掉SDK模块，参考 app2smile/adsense.js）
^https?:\/\/(api-access\.pangolin-sdk-toutiao\.com\/api\/ad\/union\/sdk|is\.snssdk\.com\/api\/ad\/union\/sdk) url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_sdk_ads.js
^https?:\/\/mi\.gdt\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_sdk_ads.js
^https?:\/\/open\.e\.kuaishou\.com\/ url script-response-body https://raw.githubusercontent.com/Xo776/byead/main/soul_sdk_ads.js

